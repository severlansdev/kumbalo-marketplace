groups:
  - name: kumbalo_alerts
    rules:
      # API Latency SLO
      - alert: HighAPILatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API latency p95 exceeds 800ms"
          description: "The 95th percentile API response time has exceeded 800ms for the last 5 minutes."

      # Error Rate SLO
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.01
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Error rate exceeds 1%"
          description: "More than 1% of requests are returning 5xx errors."

      # Database Connection Issues
      - alert: DatabaseConnectionFailure
        expr: up{job="postgresql"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL is unreachable"
          description: "The database has been down for more than 1 minute."

      # High Memory Usage
      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Memory usage exceeds 90%"
          description: "Server memory usage has been above 90% for 5 minutes."

      # Disk Space Warning
      - alert: LowDiskSpace
        expr: (1 - (node_filesystem_avail_bytes / node_filesystem_size_bytes)) * 100 > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Disk usage exceeds 85%"
          description: "Disk space is running low on {{ $labels.mountpoint }}."

      # API Down
      - alert: APIDown
        expr: up{job="kumbalo-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "KUMBALO API is DOWN"
          description: "The API service has been unreachable for over 1 minute. Immediate action required."
