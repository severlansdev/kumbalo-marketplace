name: KUMBALO CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: marketplace_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install flake8 pytest httpx

      - name: Lint with flake8
        run: |
          flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 backend/ --count --max-line-length=120 --statistics --exit-zero

      - name: Security Scan with Bandit
        run: |
          bandit -r backend/ -ll -x backend/tests/

      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:test_password@localhost:5432/marketplace_test
          JWT_SECRET_KEY: test_secret_key_for_ci_only
          JWT_ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 60
        run: |
          pytest backend/tests/ -v --tb=short

  html-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check HTML files exist
        run: |
          echo "Checking HTML files..."
          ls -la *.html
          echo "✅ All HTML files present"

      - name: Check for broken internal links
        run: |
          echo "Scanning for broken links..."
          grep -roh 'href="[^"]*\.html' *.html | sort | uniq -c | sort -rn
          echo "✅ Link scan complete"
