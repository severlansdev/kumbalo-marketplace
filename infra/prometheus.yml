global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: 'kumbalo-api'
    metrics_path: /metrics
    static_configs:
      - targets: ['api:8000']
        labels:
          service: 'kumbalo-backend'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
